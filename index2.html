<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Student Helper AI</title>
  <style>
    :root{
      --bg:#000000;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --accent:#8A2BE2;

      /* RGB glow */
      --glow1: rgba(138,43,226,.90);
      --glow2: rgba(0,255,255,.55);
      --glow3: rgba(255,0,153,.45);

      --radius:18px;
      --shadow: 0 18px 60px rgba(0,0,0,.65);
      --ease: cubic-bezier(.2,.9,.2,1);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Tahoma, Arial, "Noto Sans Arabic", "Cairo", sans-serif;
      background:
        radial-gradient(900px 520px at 80% 10%, rgba(138,43,226,.14), transparent 60%),
        radial-gradient(760px 460px at 15% 22%, rgba(0,255,255,.08), transparent 58%),
        radial-gradient(900px 520px at 45% 95%, rgba(255,0,153,.06), transparent 60%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height:1.6;
    }

    .wrap{
      min-height:100%;
      display:flex;
      justify-content:center;
      padding: clamp(14px, 3vw, 34px);
    }

    .app{
      width:min(1020px, 100%);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 6px 0;
    }

    .title{
      margin:0;
      text-align:center;
      flex:1;
      font-size: clamp(20px, 3.2vw, 34px);
      font-weight: 900;
      color: rgba(255,255,255,.96);
      text-shadow:
        0 0 24px rgba(138,43,226,.22),
        0 0 44px rgba(0,255,255,.08);
      letter-spacing:.2px;
    }

    .iconBtn{
      width:44px;
      height:44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .iconBtn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 18px rgba(138,43,226,.25),
        0 12px 32px rgba(0,0,0,.5);
    }
    .iconBtn:active{ transform: translateY(0px) scale(.99); }

    .hamburger{ width:20px; height:14px; position:relative; }
    .hamburger span{
      position:absolute; left:0; right:0;
      height:2px; border-radius:999px;
      background: rgba(255,255,255,.92);
    }
    .hamburger span:nth-child(1){ top:0; }
    .hamburger span:nth-child(2){ top:6px; opacity:.9; }
    .hamburger span:nth-child(3){ top:12px; opacity:.85; }

    .card{
      background: linear-gradient(180deg, var(--card), rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .chat{
      display:flex;
      flex-direction:column;
      min-height: clamp(420px, 66vh, 760px);
    }

    .messages{
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow:auto;
      scroll-behavior:smooth;
    }

    .messages::-webkit-scrollbar{ width: 10px; }
    .messages::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,.4);
    }

    .bubble{
      max-width: 92%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: transform .25s var(--ease), border-color .25s var(--ease), background .25s var(--ease);
    }
    .bubble.user{
      margin-inline-start:auto;
      background: rgba(138,43,226,.16);
      border-color: rgba(138,43,226,.35);
    }
    .bubble.bot{
      margin-inline-end:auto;
      background: rgba(0,255,255,.06);
      border-color: rgba(255,255,255,.10);
    }
    .meta{
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      opacity:.92;
    }

    .composer{
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.10);
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
    }

    .inputWrap{
      position:relative;
      border-radius: 14px;
      padding: 2px;
      background: rgba(255,255,255,.06);
      transition: transform .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease);
    }
    .inputWrap::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius: 16px;
      background: linear-gradient(90deg, var(--glow1), var(--glow2), var(--glow3), var(--glow1));
      filter: blur(10px);
      opacity: 0;
      transition: opacity .25s var(--ease);
      pointer-events:none;
    }
    .inputWrap:focus-within{
      transform: translateY(-1px);
      box-shadow:
        0 0 0 1px rgba(138,43,226,.55),
        0 0 18px rgba(138,43,226,.35),
        0 0 34px rgba(0,255,255,.18);
      background: rgba(255,255,255,.07);
    }
    .inputWrap:focus-within::before{ opacity: .88; }

    textarea{
      width:100%;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 1px solid rgba(138,43,226,.55);
      outline: none;
      border-radius: 12px;
      padding: 12px 12px;
      background: rgba(0,0,0,.55);
      color: var(--text);
      font-size: 16px;
      line-height:1.6;
      transition: border-color .25s var(--ease), background .25s var(--ease);
      caret-color: var(--accent);
    }
    textarea::placeholder{ color: rgba(255,255,255,.55); }
    textarea:focus{
      border-color: rgba(138,43,226,.92);
      background: rgba(0,0,0,.62);
    }

    .btn{
      border: 0;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: .1px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 10px 28px rgba(138,43,226,.22);
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), filter .2s var(--ease), opacity .2s var(--ease);
      white-space: nowrap;
      align-self: stretch;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10) inset,
        0 0 18px rgba(138,43,226,.55),
        0 0 32px rgba(0,255,255,.18),
        0 14px 40px rgba(138,43,226,.22);
      filter: saturate(1.06);
    }
    .btn:active{ transform: translateY(0px) scale(.99); }
    .btn[disabled]{ cursor:not-allowed; opacity:.65; transform:none; }

    .hint{
      padding: 0 16px 14px;
      color: rgba(255,255,255,.62);
      font-size: 13px;
    }
    .hint kbd{
      font-family: inherit;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      padding: 2px 8px;
      border-radius: 999px;
      color: rgba(255,255,255,.88);
    }

    footer{
      text-align:center;
      padding: 6px 0 2px;
      color: rgba(255,255,255,.55);
      font-size: 12px;
    }

    /* Drawer */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity:0;
      pointer-events:none;
      transition: opacity .25s var(--ease);
      z-index: 50;
    }
    .overlay.open{ opacity:1; pointer-events:auto; }

    .drawer{
      position:fixed;
      top:0; bottom:0;
      width:min(380px, 92vw);
      background: linear-gradient(180deg, rgba(20,20,24,.92), rgba(10,10,12,.88));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 30px 90px rgba(0,0,0,.8);
      z-index: 60;
      transition: transform .28s var(--ease);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    html[dir="rtl"] .drawer{ left:0; transform: translateX(-110%); }
    html[dir="rtl"] .drawer.open{ transform: translateX(0); }
    html[dir="ltr"] .drawer{ right:0; transform: translateX(110%); }
    html[dir="ltr"] .drawer.open{ transform: translateX(0); }

    .drawerHeader{
      padding: 14px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }
    .drawerTitle{ font-weight: 900; letter-spacing:.1px; }

    .drawerBody{
      padding: 12px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .section{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      overflow:hidden;
    }
    .sectionHead{
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.92);
      font-weight: 800;
      background: rgba(255,255,255,.03);
    }
    .sectionBody{ padding: 10px; }

    .toggle{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .pill{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.9);
      border-radius: 999px;
      padding: 8px 10px;
      cursor:pointer;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      font-weight: 800;
      font-size: 13px;
    }
    .pill:hover{
      transform: translateY(-1px);
      box-shadow: 0 0 14px rgba(138,43,226,.22);
      border-color: rgba(138,43,226,.35);
    }
    .pill.active{
      border-color: rgba(138,43,226,.75);
      box-shadow:
        0 0 0 1px rgba(138,43,226,.35) inset,
        0 0 18px rgba(138,43,226,.25);
      background: rgba(138,43,226,.16);
    }

    .chatList{ display:flex; flex-direction:column; gap: 8px; }
    .chatItem{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.28);
      border-radius: 14px;
      padding: 10px 10px;
      cursor:pointer;
      transition: transform .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .chatItem:hover{
      transform: translateY(-1px);
      border-color: rgba(138,43,226,.35);
      box-shadow: 0 0 18px rgba(138,43,226,.18);
      background: rgba(255,255,255,.03);
    }
    .chatItemTitle{
      font-weight: 900;
      font-size: 13px;
      color: rgba(255,255,255,.92);
      margin:0 0 2px;
    }
    .chatItemSub{
      font-size: 12px;
      color: rgba(255,255,255,.64);
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 240px;
    }
    .chip{
      font-size: 11px;
      color: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      padding: 4px 8px;
      border-radius: 999px;
      white-space:nowrap;
      margin-top: 2px;
    }

    .danger{
      background: rgba(255,0,90,.12);
      border: 1px solid rgba(255,0,90,.22);
      color: rgba(255,255,255,.92);
      border-radius: 14px;
      padding: 10px 12px;
      cursor:pointer;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
      user-select:none;
      font-weight: 900;
      text-align:center;
      -webkit-tap-highlight-color: transparent;
    }
    .danger:hover{
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(255,0,90,.12);
      border-color: rgba(255,0,90,.35);
    }

    @media (max-width: 560px){
      .composer{ grid-template-columns: 1fr; }
      .btn{ width:100%; }
      .bubble{ max-width: 100%; }
      .topbar{ padding-top: 6px; }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <aside class="drawer" id="drawer" aria-label="القائمة" aria-hidden="true">
    <div class="drawerHeader">
      <div class="drawerTitle" id="drawerTitle">القائمة</div>
      <button class="iconBtn" id="closeDrawerBtn" type="button" aria-label="إغلاق">
        <span style="font-weight:900;font-size:18px;line-height:1;">×</span>
      </button>
    </div>

    <div class="drawerBody">
      <div class="section">
        <div class="sectionHead" id="langHead">اللغة</div>
        <div class="sectionBody">
          <div class="toggle" role="group" aria-label="Language toggle">
            <button class="pill" id="langArBtn" type="button">العربية</button>
            <button class="pill" id="langEnBtn" type="button">English</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sectionHead">
          <span id="chatsTitle">المحادثات السابقة</span>
          <span class="chip" id="chatCountChip">0</span>
        </div>
        <div class="sectionBody">
          <div class="chatList" id="chatList"></div>
          <div style="height:10px"></div>
          <div class="danger" id="clearAllBtn" role="button" tabindex="0">مسح كل المحادثات</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="wrap">
    <div class="app">
      <div class="topbar">
        <button class="iconBtn" id="menuBtn" type="button" aria-label="Menu">
          <div class="hamburger" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </button>

        <h1 class="title" id="pageTitle">مساعد الطلاب الذكي</h1>

        <div style="width:44px;height:44px"></div>
      </div>

      <section class="card chat" aria-label="واجهة الدردشة">
        <div id="messages" class="messages" role="log" aria-live="polite" aria-relevant="additions"></div>

        <form id="composer" class="composer" autocomplete="off">
          <div class="inputWrap">
            <textarea
              id="question"
              name="question"
              placeholder="اكتب سؤالك هنا..."
              inputmode="text"
              aria-label="سؤال الطالب"
              required
            ></textarea>
          </div>
          <button id="sendBtn" class="btn" type="submit">اسأل البوت</button>
        </form>

        <div class="hint" id="hintText">
          للإرسال بسرعة: <kbd>Enter</kbd> (إرسال) — <kbd>Shift</kbd> + <kbd>Enter</kbd> (سطر جديد)
        </div>
      </section>

      <footer id="footerText">صنع بواسطة أحمد قريز</footer>
    </div>
  </div>

  <script>
    (function () {
      const WEBHOOK_URL = "https://a7mdlo0.app.n8n.cloud/webhook/student-helper";
      const STORAGE_KEY = "student_helper_ai_v2";

      const els = {
        html: document.documentElement,
        overlay: document.getElementById("overlay"),
        drawer: document.getElementById("drawer"),
        menuBtn: document.getElementById("menuBtn"),
        closeDrawerBtn: document.getElementById("closeDrawerBtn"),

        pageTitle: document.getElementById("pageTitle"),
        drawerTitle: document.getElementById("drawerTitle"),
        langHead: document.getElementById("langHead"),
        langArBtn: document.getElementById("langArBtn"),
        langEnBtn: document.getElementById("langEnBtn"),
        chatsTitle: document.getElementById("chatsTitle"),
        chatCountChip: document.getElementById("chatCountChip"),
        chatList: document.getElementById("chatList"),
        clearAllBtn: document.getElementById("clearAllBtn"),

        messages: document.getElementById("messages"),
        form: document.getElementById("composer"),
        textarea: document.getElementById("question"),
        sendBtn: document.getElementById("sendBtn"),
        hintText: document.getElementById("hintText"),
        footerText: document.getElementById("footerText"),
      };

      const i18n = {
        ar: {
          dir: "rtl",
          title: "مساعد الطلاب الذكي",
          menu: "القائمة",
          language: "اللغة",
          chats: "المحادثات السابقة",
          clearAll: "مسح كل المحادثات",
          placeholder: "اكتب سؤالك هنا...",
          askBtn: "اسأل البوت",
          sending: "جارٍ الإرسال...",
          you: "أنت",
          bot: "البوت",
          ready1: "أهلاً! اكتب سؤالك وسأحاول مساعدتك.",
          ready2: "جاهز لاستقبال أسئلتك.",
          typing: "... جارٍ توليد الرد",
          sendHint: 'للإرسال بسرعة: <kbd>Enter</kbd> (إرسال) — <kbd>Shift</kbd> + <kbd>Enter</kbd> (سطر جديد)',
          madeBy: "صنع بواسطة أحمد قريز",
          noChats: "لا توجد محادثات بعد.",
          failed: "تعذر الحصول على رد.",
          chatLabel: "محادثة",
        },
        en: {
          dir: "ltr",
          title: "Smart Student Assistant",
          menu: "Menu",
          language: "Language",
          chats: "Previous chats",
          clearAll: "Clear all chats",
          placeholder: "Type your question here...",
          askBtn: "Ask the bot",
          sending: "Sending...",
          you: "You",
          bot: "Bot",
          ready1: "Hi! Type your question and I’ll help.",
          ready2: "Ready for your questions.",
          typing: "... generating reply",
          sendHint: '<span style="direction:ltr;display:inline-block">Quick send: <kbd>Enter</kbd> (Send) — <kbd>Shift</kbd> + <kbd>Enter</kbd> (New line)</span>',
          madeBy: "Made by Ahmed Quraiz",
          noChats: "No chats yet.",
          failed: "Couldn’t get a reply.",
          chatLabel: "Chat",
        }
      };

      function uid() {
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function nowTime() {
        const d = new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${hh}:${mm}`;
      }

      function nowISO() {
        return new Date().toISOString();
      }

      function safeText(v) {
        return (v == null) ? "" : String(v);
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const s = JSON.parse(raw);
          if (!s || typeof s !== "object") return null;
          return s;
        } catch {
          return null;
        }
      }

      function saveState(s) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
      }

      function defaultState() {
        return { version: 2, language: "ar", activeChatId: null, chats: [] };
      }

      let state = loadState() || defaultState();

      function ensureActiveChat() {
        if (state.activeChatId && state.chats.some(c => c.id === state.activeChatId)) return;
        const newChat = { id: uid(), createdAt: nowISO(), updatedAt: nowISO(), messages: [] };
        state.chats.unshift(newChat);
        state.activeChatId = newChat.id;
        saveState(state);
      }

      function getActiveChat() {
        return state.chats.find(c => c.id === state.activeChatId) || null;
      }

      function t() {
        return i18n[state.language] || i18n.ar;
      }

      function setLanguage(lang) {
        state.language = (lang === "en") ? "en" : "ar";
        saveState(state);
        applyLanguage();
        renderChatList();
        renderMessages();
      }

      function applyLanguage() {
        const tr = t();
        els.html.lang = (state.language === "en") ? "en" : "ar";
        els.html.dir = tr.dir;

        els.pageTitle.textContent = tr.title;
        els.drawerTitle.textContent = tr.menu;
        els.langHead.textContent = tr.language;
        els.chatsTitle.textContent = tr.chats;
        els.clearAllBtn.textContent = tr.clearAll;

        els.textarea.placeholder = tr.placeholder;
        els.sendBtn.textContent = tr.askBtn;
        els.hintText.innerHTML = tr.sendHint;
        els.footerText.textContent = tr.madeBy;

        els.langArBtn.classList.toggle("active", state.language === "ar");
        els.langEnBtn.classList.toggle("active", state.language === "en");
      }

      function openDrawer() {
        els.overlay.classList.add("open");
        els.drawer.classList.add("open");
      }

      function closeDrawer() {
        els.overlay.classList.remove("open");
        els.drawer.classList.remove("open");
      }

      function escapePreview(s) {
        const one = safeText(s).replace(/\s+/g, " ").trim();
        return one.length > 60 ? one.slice(0, 60) + "…" : one;
      }

      function chatTitle(chat, index) {
        const tr = t();
        const firstUser = chat.messages.find(m => m.role === "user");
        if (firstUser && firstUser.text && firstUser.text.trim()) return escapePreview(firstUser.text);
        return `${tr.chatLabel} ${state.chats.length - index}`;
      }

      function renderChatList() {
        els.chatList.innerHTML = "";
        els.chatCountChip.textContent = String(state.chats.length);

        if (!state.chats.length) {
          const empty = document.createElement("div");
          empty.style.color = "rgba(255,255,255,.64)";
          empty.style.fontSize = "13px";
          empty.style.padding = "6px";
          empty.textContent = t().noChats;
          els.chatList.appendChild(empty);
          return;
        }

        state.chats.forEach((chat, idx) => {
          const item = document.createElement("div");
          item.className = "chatItem";
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");

          const left = document.createElement("div");
          const h = document.createElement("p");
          h.className = "chatItemTitle";
          h.textContent = chatTitle(chat, idx);

          const sub = document.createElement("p");
          sub.className = "chatItemSub";
          const last = chat.messages[chat.messages.length - 1];
          sub.textContent = last ? escapePreview(last.text) : "";

          left.appendChild(h);
          left.appendChild(sub);

          const chip = document.createElement("div");
          chip.className = "chip";
          chip.textContent = String(chat.messages.length);

          if (chat.id === state.activeChatId) {
            item.style.borderColor = "rgba(138,43,226,.55)";
            item.style.boxShadow = "0 0 18px rgba(138,43,226,.18)";
            item.style.background = "rgba(138,43,226,.10)";
          }

          item.appendChild(left);
          item.appendChild(chip);

          const activate = () => {
            state.activeChatId = chat.id;
            saveState(state);
            renderChatList();
            renderMessages();
            closeDrawer();
            els.textarea.focus();
          };

          item.addEventListener("click", activate);
          item.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activate(); }
          });

          els.chatList.appendChild(item);
        });
      }

      function bubble(text, role) {
        const tr = t();
        const b = document.createElement("div");
        b.className = "bubble " + (role === "user" ? "user" : "bot");
        b.textContent = safeText(text);

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = (role === "user" ? tr.you : tr.bot) + " • " + nowTime();
        b.appendChild(meta);
        return b;
      }

      function renderMessages() {
        const chat = getActiveChat();
        els.messages.innerHTML = "";
        const tr = t();

        if (!chat || !chat.messages.length) {
          const b = bubble(tr.ready1, "bot");
          const meta = b.querySelector(".meta");
          meta.textContent = tr.ready2;
          els.messages.appendChild(b);
          els.messages.scrollTop = els.messages.scrollHeight;
          return;
        }

        chat.messages.forEach(m => els.messages.appendChild(bubble(m.text, m.role)));
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      function autosize() {
        els.textarea.style.height = "auto";
        els.textarea.style.height = Math.min(els.textarea.scrollHeight, 180) + "px";
      }

      function setLoading(isLoading) {
        els.sendBtn.disabled = isLoading;
        els.textarea.disabled = isLoading;
        els.sendBtn.textContent = isLoading ? t().sending : t().askBtn;
      }

      async function postWebhook(message) {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json, text/plain, */*" },
          body: JSON.stringify({ message })
        });

        const ct = (res.headers.get("content-type") || "").toLowerCase();
        const data = ct.includes("application/json") ? await res.json() : await res.text();
        if (!res.ok) throw new Error((typeof data === "string" ? data : JSON.stringify(data)) || ("HTTP " + res.status));
        return data;
      }

      function extractReply(payload) {
        if (payload == null) return "";
        if (typeof payload === "string") return payload;

        if (Array.isArray(payload)) {
          const first = payload[0];
          if (typeof first === "string") return first;
          if (first && typeof first === "object") payload = first;
          else return JSON.stringify(payload, null, 2);
        }

        if (typeof payload === "object") {
          for (const k of ["reply","response","message","text","output","answer"]) {
            if (typeof payload[k] === "string" && payload[k].trim()) return payload[k].trim();
          }
          return JSON.stringify(payload, null, 2);
        }
        return String(payload);
      }

      function addToHistory(role, text) {
        const chat = getActiveChat();
        if (!chat) return;
        chat.messages.push({ role, text: safeText(text), at: nowISO() });
        chat.updatedAt = nowISO();
        state.chats.sort((a,b) => (b.updatedAt || b.createdAt).localeCompare(a.updatedAt || a.createdAt));
        saveState(state);
        renderChatList();
      }

      function appendMessageToUI(role, text) {
        els.messages.appendChild(bubble(text, role));
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      els.menuBtn.addEventListener("click", openDrawer);
      els.closeDrawerBtn.addEventListener("click", closeDrawer);
      els.overlay.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });

      els.langArBtn.addEventListener("click", () => setLanguage("ar"));
      els.langEnBtn.addEventListener("click", () => setLanguage("en"));

      els.clearAllBtn.addEventListener("click", () => {
        state.chats = [];
        state.activeChatId = null;
        saveState(state);
        ensureActiveChat();
        renderChatList();
        renderMessages();
      });
      els.clearAllBtn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); els.clearAllBtn.click(); }
      });

      els.textarea.addEventListener("input", autosize);
      els.textarea.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); els.form.requestSubmit(); }
      });

      els.form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = (els.textarea.value || "").trim();
        if (!message) { els.textarea.focus(); return; }

        addToHistory("user", message);
        appendMessageToUI("user", message);

        els.textarea.value = "";
        autosize();

        const typingBubble = bubble(t().typing, "bot");
        els.messages.appendChild(typingBubble);
        els.messages.scrollTop = els.messages.scrollHeight;

        try {
          setLoading(true);
          const payload = await postWebhook(message);
          const reply = extractReply(payload) || t().failed;
          typingBubble.firstChild.nodeValue = reply;
          addToHistory("bot", reply);
        } catch (err) {
          const msg = (err && err.message) ? String(err.message) : "";
          const fallback = t().failed + (msg ? " " + msg : "");
          typingBubble.firstChild.nodeValue = fallback;
          addToHistory("bot", fallback);
        } finally {
          setLoading(false);
          els.textarea.focus();
        }
      });

      ensureActiveChat();
      applyLanguage();
      renderChatList();
      renderMessages();
      autosize();
      els.textarea.focus();
    })();
  </script>
</body>
</html>
