<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Helper - Your AI Study Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hamburger Menu Button -->
    <button class="hamburger-menu" id="hamburgerMenu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Side Menu (Hamburger) -->
    <aside class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <span class="user-name" id="userNameDisplay">زائر</span>
                    <span class="user-status">متصل</span>
                </div>
            </div>
        </div>
        
        <div class="side-menu-content">
            <button class="menu-item" id="newChatBtn">
                <span class="menu-icon">➕</span>
                <span>دردشة جديدة</span>
            </button>
            
            <div class="menu-section">
                <span class="section-title">الدردشات السابقة</span>
                <div id="previousChats">
                    <div class="no-chats">لا توجد دردشات سابقة</div>
                </div>
            </div>
        </div>
        
        <div class="side-menu-footer">
            <button class="menu-item" id="settingsBtn">
                <span class="menu-icon">⚙️</span>
                <span>الإعدادات</span>
            </button>
            <button class="menu-item logout" id="logoutBtn">
                <span class="menu-icon">🚪</span>
                <span>تسجيل خروج</span>
            </button>
        </div>
    </aside>

    <!-- Overlay for closing menu -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>الإعدادات</h2>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editUsername">اسم المستخدم</label>
                    <input type="text" id="editUsername" placeholder="أدخل اسمك">
                </div>
                <div class="form-group">
                    <label for="editLanguage">اللغة</label>
                    <select id="editLanguage">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" id="saveSettings">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <span class="logo-icon">🎓</span>
                        <h1 class="logo-text">Student Helper</h1>
                    </div>
                    <div class="header-subtitle" id="welcomeMessage">مرحباً بك!</div>
                </div>
            </div>
        </header>

        <div class="container">
            <!-- Quick Action Buttons -->
            <section class="quick-actions">
                <div class="quick-actions-grid">
                    <button class="quick-btn" data-action="pdf">
                        <span class="quick-btn-icon">📘</span>
                        <span class="quick-btn-text">Get PDF</span>
                    </button>
                    <button class="quick-btn" data-action="summarize">
                        <span class="quick-btn-icon">📖</span>
                        <span class="quick-btn-text">Summarize</span>
                    </button>
                    <button class="quick-btn" data-action="explain">
                        <span class="quick-btn-icon">🧠</span>
                        <span class="quick-btn-text">Explain</span>
                    </button>
                    <button class="quick-btn" data-action="upload-pdf">
                        <span class="quick-btn-icon">📁</span>
                        <span class="quick-btn-text">Upload PDF</span>
                    </button>
                </div>
            </section>

            <!-- Chat Container -->
            <section class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <!-- Welcome Message -->
                    <div class="message bot-message fade-in">
                        <div class="message-avatar">🤖</div>
                        <div class="message-content">
                            <div class="message-text" id="botWelcomeMessage">
                                مرحباً! أنا مساعدك الدراسي الذكي. يمكنني مساعدتك في رفع ملفات PDF والإجابة على أسئلتك حول المحتوى. كيف يمكنني مساعدتك اليوم؟
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div class="loading-indicator" id="loadingIndicator">
                    <div class="loading-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="loading-text">جاري المعالجة...</div>
                </div>
            </section>

            <!-- Input Area -->
            <section class="input-area">
                <form class="input-form" id="inputForm">
                    <div class="input-container">
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="اسألني أي شيء عن دراستك..."
                            rows="1"
                            maxlength="1000"
                        ></textarea>
                        <button type="submit" class="send-button" id="sendButton" disabled>
                            <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <span class="character-count" id="characterCount">0 / 1000</span>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" style="display: none;">
        <div class="container">
            <p class="footer-text">© 2024 Student Helper. Made with ❤️ for students.</p>
        </div>
    </footer>

    <!-- Hidden file input for PDF upload -->
    <input type="file" id="pdfUploadInput" accept=".pdf" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
