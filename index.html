<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مساعد الطلاب — Student Helper</title>
  <style>
    :root {
      --bg: #000000;
      --purple: #8A2BE2;
      --purple-dim: rgba(138, 43, 226, 0.35);
      --text: #e8e0f0;
      --muted: #9a8fb0;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, "Arabic UI Text", "Geeza Pro", Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* No global glow — only input focus */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--purple-dim);
      flex-shrink: 0;
    }

    .brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--purple);
      letter-spacing: 0.02em;
    }

    .hamburger {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--purple-dim);
      background: transparent;
      color: var(--purple);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.2s, border-color 0.2s;
    }

    .hamburger:hover {
      background: rgba(138, 43, 226, 0.12);
      border-color: var(--purple);
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: currentColor;
      border-radius: 1px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 0;
    }

    .intro {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .reply-area {
      flex: 1;
      min-height: 120px;
      margin-bottom: 1rem;
      padding: 1rem;
      border: 1px solid var(--purple-dim);
      border-radius: 12px;
      background: rgba(138, 43, 226, 0.06);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .reply-area:empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
    }

    .reply-area.loading {
      color: var(--muted);
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .message-input {
      width: 100%;
      min-height: 100px;
      padding: 0.85rem 1rem;
      border: 1px solid var(--purple-dim);
      border-radius: 12px;
      background: #0d0d0d;
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .message-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.45), 0 0 20px rgba(138, 43, 226, 0.35);
    }

    .send-btn {
      align-self: flex-start;
      padding: 0.65rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--purple);
      color: #fff;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) {
      filter: brightness(1.1);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--purple-dim);
      flex-shrink: 0;
    }

    footer a {
      color: var(--purple);
      text-decoration: none;
    }

    /* Drawer overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s, visibility 0.25s;
      z-index: 100;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .drawer {
      position: fixed;
      top: 0;
      bottom: 0;
      width: min(100%, 340px);
      max-width: 100%;
      background: #0a0a0a;
      border-inline-start: 1px solid var(--purple-dim);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: transform 0.28s ease;
      overflow: hidden;
    }

    [dir="rtl"] .drawer {
      right: 0;
      transform: translateX(100%);
    }

    [dir="ltr"] .drawer {
      left: 0;
      transform: translateX(-100%);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      padding: 1rem;
      border-bottom: 1px solid var(--purple-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--purple);
    }

    .close-drawer {
      width: 36px;
      height: 36px;
      border: 1px solid var(--purple-dim);
      background: transparent;
      color: var(--purple);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
    }

    .lang-toggle {
      width: 100%;
      margin: 0.75rem 1rem;
      padding: 0.6rem 1rem;
      border: 1px solid var(--purple);
      background: rgba(138, 43, 226, 0.15);
      color: var(--purple);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .lang-toggle:hover {
      background: rgba(138, 43, 226, 0.28);
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 1rem 1rem;
    }

    .conv-item {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--purple-dim);
    }

    .conv-item:last-child {
      border-bottom: none;
    }

    .conv-q {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }

    .conv-a {
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-conv {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem 0;
    }

    .error-msg {
      color: #ff8a8a;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <span class="brand" id="brandTitle">مساعد الطلاب</span>
    <button type="button" class="hamburger" id="btnMenu" aria-label="القائمة" title="القائمة">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>
    <p class="intro" id="introText"></p>
    <div class="reply-area" id="replyArea" data-placeholder=""></div>
    <p class="error-msg" id="errorBox" hidden></p>
    <div class="input-wrap">
      <textarea
        id="messageInput"
        class="message-input"
        rows="4"
        autocomplete="off"
      ></textarea>
      <button type="button" class="send-btn" id="sendBtn"></button>
    </div>
  </main>

  <footer>
    <span id="footerCredit">صنع بواسطة أحمد قريز</span>
  </footer>

  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2 id="drawerTitle">المحادثة</h2>
      <button type="button" class="close-drawer" id="btnCloseDrawer" aria-label="إغلاق">×</button>
    </div>
    <button type="button" class="lang-toggle" id="langToggle"></button>
    <div class="conv-list" id="convList"></div>
  </aside>

  <script>
    (function () {
      const WEBHOOK = "https://a7mdlo0.app.n8n.cloud/webhook/student-helper";

      const I18N = {
        ar: {
          brand: "مساعد الطلاب",
          intro: "اسأل عن دروسك أو واجباتك. الرد يظهر هنا، والمحادثة كاملة في القائمة.",
          placeholderReply: "سيظهر الرد هنا…",
          send: "إرسال",
          sending: "جاري الإرسال…",
          drawerTitle: "سجل المحادثة",
          langToggle: "English",
          emptyConv: "لا توجد رسائل بعد.",
          userLabel: "سؤالك",
          botLabel: "الرد",
          errorNetwork: "تعذر الاتصال. تحقق من الشبكة وحاول مرة أخرى.",
          errorServer: "حدث خطأ من الخادم.",
          menuAria: "القائمة",
          closeAria: "إغلاق",
        },
        en: {
          brand: "Student Helper",
          intro: "Ask about your lessons or homework. Replies appear here; full history is in the menu.",
          placeholderReply: "The reply will appear here…",
          send: "Send",
          sending: "Sending…",
          drawerTitle: "Conversation history",
          langToggle: "العربية",
          emptyConv: "No messages yet.",
          userLabel: "You",
          botLabel: "Reply",
          errorNetwork: "Could not connect. Check your network and try again.",
          errorServer: "A server error occurred.",
          menuAria: "Menu",
          closeAria: "Close",
        },
      };

      let lang = localStorage.getItem("student-helper-lang") || "ar";
      if (lang !== "ar" && lang !== "en") lang = "ar";

      /** @type {{ q: string, a: string }[]} */
      let history = [];
      try {
        const raw = localStorage.getItem("student-helper-history");
        if (raw) history = JSON.parse(raw);
        if (!Array.isArray(history)) history = [];
      } catch (e) {
        history = [];
      }

      const el = {
        html: document.documentElement,
        body: document.body,
        brandTitle: document.getElementById("brandTitle"),
        introText: document.getElementById("introText"),
        replyArea: document.getElementById("replyArea"),
        errorBox: document.getElementById("errorBox"),
        messageInput: document.getElementById("messageInput"),
        sendBtn: document.getElementById("sendBtn"),
        overlay: document.getElementById("overlay"),
        drawer: document.getElementById("drawer"),
        convList: document.getElementById("convList"),
        btnMenu: document.getElementById("btnMenu"),
        btnCloseDrawer: document.getElementById("btnCloseDrawer"),
        langToggle: document.getElementById("langToggle"),
        drawerTitle: document.getElementById("drawerTitle"),
      };

      function t(key) {
        return I18N[lang][key] || I18N.ar[key] || key;
      }

      function applyLang() {
        el.html.setAttribute("lang", lang);
        el.html.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
        el.brandTitle.textContent = t("brand");
        el.introText.textContent = t("intro");
        el.replyArea.setAttribute("data-placeholder", t("placeholderReply"));
        el.sendBtn.textContent = el.sendBtn.disabled ? t("sending") : t("send");
        el.drawerTitle.textContent = t("drawerTitle");
        el.langToggle.textContent = t("langToggle");
        el.btnMenu.setAttribute("aria-label", t("menuAria"));
        el.btnMenu.setAttribute("title", t("menuAria"));
        el.btnCloseDrawer.setAttribute("aria-label", t("closeAria"));
        renderConvList();
      }

      function saveHistory() {
        try {
          localStorage.setItem("student-helper-history", JSON.stringify(history));
        } catch (e) {}
      }

      function renderConvList() {
        if (!history.length) {
          el.convList.innerHTML = '<p class="empty-conv">' + escapeHtml(t("emptyConv")) + "</p>';
          return;
        }
        el.convList.innerHTML = history
          .map(
            (item) =>
              '<div class="conv-item">' +
              '<div class="conv-q">' +
              escapeHtml(t("userLabel")) +
              "</div>" +
              '<div class="conv-a">' +
              escapeHtml(item.q) +
              "</div>" +
              '<div class="conv-q" style="margin-top:0.6rem">' +
              escapeHtml(t("botLabel")) +
              "</div>" +
              '<div class="conv-a">' +
              escapeHtml(item.a) +
              "</div>" +
              "</div>"
          )
          .join("");
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function extractReply(data) {
        if (data == null) return "";
        if (typeof data === "string") return data;
        if (typeof data === "object") {
          if (typeof data.reply === "string") return data.reply;
          if (typeof data.message === "string" && !Array.isArray(data)) return data.message;
          if (typeof data.answer === "string") return data.answer;
          if (typeof data.text === "string") return data.text;
          if (typeof data.output === "string") return data.output;
          if (data.data && typeof data.data === "string") return data.data;
          try {
            return JSON.stringify(data, null, 2);
          } catch (e) {
            return String(data);
          }
        }
        return String(data);
      }

      async function sendMessage() {
        const text = (el.messageInput.value || "").trim();
        if (!text) return;

        el.errorBox.hidden = true;
        el.sendBtn.disabled = true;
        el.sendBtn.textContent = t("sending");
        el.replyArea.classList.add("loading");
        el.replyArea.textContent = t("sending");

        const payload = {
          message: text,
          lang: lang,
        };

        try {
          const res = await fetch(WEBHOOK, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json, text/plain, */*",
            },
            body: JSON.stringify(payload),
          });

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          let replyText = "";
          if (ct.includes("application/json")) {
            const json = await res.json();
            replyText = extractReply(json);
          } else {
            replyText = await res.text();
          }

          if (!res.ok) {
            throw new Error(replyText || t("errorServer") + " (" + res.status + ")");
          }

          el.replyArea.classList.remove("loading");
          el.replyArea.textContent = replyText || (lang === "ar" ? "(لا يوجد نص في الرد)" : "(Empty reply)");
          history.push({ q: text, a: el.replyArea.textContent });
          saveHistory();
          renderConvList();
          el.messageInput.value = "";
        } catch (err) {
          el.replyArea.classList.remove("loading");
          el.replyArea.textContent = "";
          el.errorBox.textContent = err.message || t("errorNetwork");
          el.errorBox.hidden = false;
        } finally {
          el.sendBtn.disabled = false;
          el.sendBtn.textContent = t("send");
        }
      }

      function openDrawer() {
        el.overlay.classList.add("open");
        el.drawer.classList.add("open");
        el.overlay.setAttribute("aria-hidden", "false");
        el.drawer.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeDrawer() {
        el.overlay.classList.remove("open");
        el.drawer.classList.remove("open");
        el.overlay.setAttribute("aria-hidden", "true");
        el.drawer.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      el.sendBtn.addEventListener("click", sendMessage);
      el.messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      el.btnMenu.addEventListener("click", openDrawer);
      el.btnCloseDrawer.addEventListener("click", closeDrawer);
      el.overlay.addEventListener("click", closeDrawer);

      el.langToggle.addEventListener("click", function () {
        lang = lang === "ar" ? "en" : "ar";
        localStorage.setItem("student-helper-lang", lang);
        applyLang();
      });

      applyLang();
    })();
  </script>
</body>
</html>
