<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Helper - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <span class="logo-icon">🎓</span>
                <h1 class="logo-text">Student Helper</h1>
            </div>
            <p class="login-subtitle">Your AI Study Assistant</p>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" name="username" placeholder="أدخل اسمك" required>
                </div>
                
                <div class="form-group">
                    <label for="language">اللغة المفضلة</label>
                    <select id="language" name="language">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
                
                <div id="loginError" class="login-error" style="display: none;"></div>
                
                <button type="submit" class="login-btn">دخول</button>
            </form>
            
            <div class="login-footer">
                <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
            </div>
            
            <p class="login-hint">لا تحتاج كلمة مرور - فقط أدخل اسمك للبدء</p>
        </div>
    </div>
    
    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>إعادة تعيين كلمة المرور</h2>
                <button class="close-btn" id="closeForgotPassword">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="resetEmail">البريد الإلكتروني</label>
                    <input type="email" id="resetEmail" placeholder="أدخل بريدك الإلكتروني" required>
                </div>
                <button id="sendResetCode" class="login-btn">إرسال رمز التحقق</button>
                <div id="resetCodeContainer" style="display: none; margin-top: 1rem;">
                    <div class="form-group">
                        <label for="resetCode">رمز التحقق</label>
                        <input type="text" id="resetCode" placeholder="أدخل رمز التحقق" required>
                    </div>
                    <button id="verifyCode" class="login-btn">تأكيد</button>
                </div>
                <div id="resetError" class="login-error" style="display: none; margin-top: 0.5rem;"></div>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
