<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Helper - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <span class="logo-icon">🎓</span>
                <h1 class="logo-text">Student Helper</h1>
            </div>
            <p class="login-subtitle">Your AI Study Assistant</p>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" name="username" placeholder="أدخل اسمك" required>
                </div>
                
                <div class="form-group">
                    <label for="language">اللغة المفضلة</label>
                    <select id="language" name="language">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
                
                <button type="submit" class="login-btn">دخول</button>
            </form>
            
            <p class="login-hint">لا تحتاج كلمة مرور - فقط أدخل اسمك للبدء</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const language = document.getElementById('language').value;
            
            // Save user data
            localStorage.setItem('studentHelper_user', JSON.stringify({
                username: username,
                language: language,
                loginTime: new Date().toISOString()
            }));
            
            // Redirect to main app
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
